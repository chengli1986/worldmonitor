syntax = "proto3";

package worldmonitor.aviation.v1;

import "buf/validate/validate.proto";
import "sebuf/http/annotations.proto";
import "worldmonitor/aviation/v1/price_quote.proto";

// SearchFlightPricesRequest specifies parameters for a flight price search.
message SearchFlightPricesRequest {
  // Origin airport IATA code.
  string origin = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 4
  ];
  // Destination airport IATA code.
  string destination = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 3,
    (buf.validate.field).string.max_len = 4
  ];
  // Outbound departure date (ISO 8601).
  string departure_date = 3 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 10,
    (buf.validate.field).string.max_len = 10
  ];
  // Return date (ISO 8601), empty for one-way.
  string return_date = 4 [(sebuf.http.query) = { name: "return_date" }];
  // Number of adult passengers (1-9).
  int32 adults = 5 [
    (buf.validate.field).int32.gte = 1,
    (buf.validate.field).int32.lte = 9
  ];
  // Desired cabin class.
  CabinClass cabin = 6 [(sebuf.http.query) = { name: "cabin" }];
  // Whether to restrict to nonstop flights only.
  bool nonstop_only = 7 [(sebuf.http.query) = { name: "nonstop_only" }];
  // Maximum number of quotes to return (1-50).
  int32 max_results = 8 [
    (buf.validate.field).int32.gte = 1,
    (buf.validate.field).int32.lte = 50
  ];
}

// SearchFlightPricesResponse contains flight price offers.
message SearchFlightPricesResponse {
  // Price quotes matching the search.
  repeated PriceQuote quotes = 1;
  // Provider name (e.g., "amadeus", "demo").
  string provider = 2;
  // Whether results are from demo/simulated mode.
  bool is_demo_mode = 3;
  // Last update time as Unix epoch milliseconds.
  int64 updated_at = 4 [(sebuf.http.int64_encoding) = INT64_ENCODING_NUMBER];
}
